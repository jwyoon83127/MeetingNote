<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경영집행위원회 - 사내 회의록 관리 시스템</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Pretendard', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .sidebar-item-active {
            background: #e0f2fe;
            color: #0369a1;
            border-right: 4px solid #0369a1;
        }

        .toast-notification {
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast-notification.hide {
            animation: slideOut 0.3s ease-in forwards;
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-3"></div>
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-slate-200 flex-shrink-0 flex flex-col">
            <div class="p-6">
                <div class="flex items-center gap-2 mb-8">
                    <div class="bg-brand-600 p-2 rounded-lg text-white">
                        <i data-lucide="layout-grid" class="w-6 h-6"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-800">경영집행위원회</h1>
                </div>

                <nav class="space-y-1">
                    <a href="#" id="nav-dashboard" onclick="navigateTo('dashboard')"
                        class="sidebar-item-active flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-all text-slate-600">
                        <i data-lucide="home" class="w-5 h-5"></i>
                        <span>대시보드</span>
                    </a>
                    <a href="#" id="nav-calendar" onclick="navigateTo('calendar')"
                        class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium text-slate-600 hover:bg-slate-50 transition-all">
                        <i data-lucide="calendar-days" class="w-5 h-5"></i>
                        <span>회의 일정 관리</span>
                    </a>
                    <a href="#" id="nav-meetings" onclick="navigateTo('meetings')"
                        class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium text-slate-600 hover:bg-slate-50 transition-all">
                        <i data-lucide="calendar" class="w-5 h-5"></i>
                        <span>회의 목록</span>
                    </a>
                    <a href="#" id="nav-create" onclick="navigateTo('create')"
                        class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium text-slate-600 hover:bg-slate-50 transition-all">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i>
                        <span>회의 생성</span>
                    </a>
                    <a href="#" id="nav-agendas" onclick="navigateTo('agendas')"
                        class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium text-slate-600 hover:bg-slate-50 transition-all">
                        <i data-lucide="check-square" class="w-5 h-5"></i>
                        <span>회의 안건</span>
                    </a>
                    <a href="#" id="nav-users" onclick="navigateTo('users')"
                        class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium text-slate-600 hover:bg-slate-50 transition-all">
                        <i data-lucide="users" class="w-5 h-5"></i>
                        <span>사용자 관리</span>
                    </a>
                </nav>
            </div>

            <div class="mt-auto p-6 border-t border-slate-100">
                <div class="flex items-center gap-3 px-4 py-2">
                    <div
                        class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 font-bold">
                        JD</div>
                    <div class="flex flex-col overflow-hidden">
                        <span class="text-sm font-semibold truncate">Jane Doe</span>
                        <span class="text-xs text-slate-500 truncate">Marketing Team</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-slate-50 p-8">
            <div id="content-area" class="transition-all duration-300">
                <!-- JavaScript will render content here -->
                <div class="flex items-center justify-center h-full">
                    <div class="text-slate-400 animate-pulse flex flex-col items-center gap-2">
                        <i data-lucide="loader-2" class="w-8 h-8 animate-spin"></i>
                        <p class="text-sm font-medium">데이터를 불러오는 중...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- App Script -->
    <script src="/static/js/app.js" onerror="console.error('Failed to load app.js from /static/js/app.js')"></script>
    <script>
        // Check if navigation is defined
        window.addEventListener('load', () => {
            console.log('Window Load Event - Lucide version:', window.lucide ? 'Available' : 'Missing');
            if (typeof navigateTo === 'undefined') {
                console.error('CRITICAL: navigateTo is not defined. app.js might have failed to load or execute.');
                document.getElementById('content-area').innerHTML = `
                    <div class="p-10 text-rose-600 bg-rose-50 rounded-2xl border border-rose-100 flex flex-col items-center gap-4">
                        <i data-lucide="alert-triangle" class="w-12 h-12"></i>
                        <div class="text-center">
                            <h2 class="text-xl font-bold mb-2">스크립트 로드 실패</h2>
                            <p>애플리케이션 스크립트를 불러오지 못했습니다. 페이지를 새로고침하거나 관리자에게 문의하세요.</p>
                            <p class="text-sm mt-2 opacity-70">Path: /static/js/app.js</p>
                        </div>
                    </div>
                `;
                if (window.lucide) lucide.createIcons();
            }
        });

        // Initialize static icons
        if (window.lucide) {
            lucide.createIcons();
        }
    </script>
</body>

</html>
